# client_config.SOC_CAN.yaml
# Structural scaffold — connector registry populated by CC (T6.1).
# Sections marked <FILL:...> require engineer input before pipeline runs end-to-end.

client:
  code: <FILL:client_code>           # e.g. SOC_CAN
  schema_version: <FILL:schema_version>  # e.g. 1.1
  config_version: <FILL:config_version>

package:
  folder_priority:
    - name: data
    - name: raw
    - name: audit

application_id:
  source: filename_tokens
  filename:
    pattern: '^v\d+_(?P<geo>USA|CAN)_(?P<debtor>\d+)_(?P<dt>\d{14})(?P<test>_test)?_(?P<connector>C\d+)_.+_(?P<sequence_id>\d{7,12})_(?P<step>\d{1,4})(?:_\d+)?\.\w+$'
    canonical_app_id_groups: [debtor, dt]
  suffix_rules:
    - suffix: _test
      action: strip
      flag_lineage: true

sessions:
  model: can_multi   # CAN packages carry multiple CAN sessions (S3.T3)

connectors:
  # ── CAN Bureau connectors (FFF — hard quarantine until Q-FFF resolved) ────
  - code: C100810
    is_credential: false
    parse_strategy: fff

  - code: C161796
    is_credential: false
    parse_strategy: fff

  # ── Shared connectors — same parse_strategy as SOC_USA ────────────────────
  - code: C225334
    is_credential: false
    parse_strategy: raw_json

  - code: C78098
    is_credential: false
    parse_strategy: gds_envelope_json

  - code: C78449
    is_credential: false
    parse_strategy: gds_envelope_json

  - code: C103403
    is_credential: false
    parse_strategy: pygdsa_json

  - code: C215125
    is_credential: false
    parse_strategy: gds_envelope_json

  - code: C238743
    is_credential: false
    parse_strategy: gds_envelope_json

  - code: C224847
    is_credential: false
    parse_strategy: gds_envelope_json

  # ── Credential connectors (is_credential: true — never parsed) ────────────
  - code: C161653
    is_credential: true
    parse_strategy: credential_discard

preprocess:
  credential_scrub:
    - connector: C103403
      method: redact
      location: http_header_authorization
    - connector: C161653
      method: discard_payload
      critical: true
  external_ref:
    size_threshold_kb: <FILL:threshold_kb>
    object_store_uri_pattern: <FILL:uri_pattern>

pii:
  fields:
    # Standard schema applicant PII paths
    - { name: "firstName",    connectors: ["C225334"], method: "pseudonym_reversible",
        sdd_path: "system.application.applicants[].firstName" }
    - { name: "lastName",     connectors: ["C225334"], method: "pseudonym_reversible",
        sdd_path: "system.application.applicants[].lastName" }
    - { name: "dateOfBirth",  connectors: ["C225334"], method: "date_to_utc_iso",
        sdd_path: "system.application.applicants[].dateOfBirth" }
    - { name: "ssn",          connectors: ["C225334"], method: "oneway_hash",
        sdd_path: "system.application.applicants[].ssn" }
    - { name: "sin",          connectors: ["C225334"], method: "oneway_hash",
        sdd_path: "system.application.applicants[].sin" }
    - { name: "address",      connectors: ["C225334"], method: "pseudonym_reversible",
        sdd_path: "system.application.applicants[].address" }
    - { name: "phoneNumber",  connectors: ["C225334"], method: "pseudonym_reversible",
        sdd_path: "system.application.applicants[].phoneNumber" }
    - { name: "emailAddress", connectors: ["C225334"], method: "pseudonym_reversible",
        sdd_path: "system.application.applicants[].emailAddress" }
    # Vendor-prefixed applicant PII (C225334 raw field names also written to record)
    - { name: "Applicant_SSN",          sdd_path: "system.application.applicants[].Applicant_SSN",          method: "oneway_hash" }
    - { name: "Applicant_DebtorNumber", sdd_path: "system.application.applicants[].Applicant_DebtorNumber", method: "scrub_never_store" }
    - { name: "Applicant_FirstName",    sdd_path: "system.application.applicants[].Applicant_FirstName",    method: "pseudonym_reversible" }
    - { name: "Applicant_LastName",     sdd_path: "system.application.applicants[].Applicant_LastName",     method: "pseudonym_reversible" }
    - { name: "Applicant_MiddleName",   sdd_path: "system.application.applicants[].Applicant_MiddleName",   method: "pseudonym_reversible" }
    - { name: "Applicant_DateOfBirth",  sdd_path: "system.application.applicants[].Applicant_DateOfBirth",  method: "year_only" }
    - { name: "Applicant_EmployerPhone",sdd_path: "system.application.applicants[].Applicant_EmployerPhone",method: "pseudonym_reversible" }
    # Contact information PII
    - { name: "ApplicantContact_Email", sdd_path: "system.application.applicants[].contactInformation[].ApplicantContact_Email", method: "pseudonym_reversible" }
    - { name: "ApplicantContact_Phone", sdd_path: "system.application.applicants[].contactInformation[].ApplicantContact_Phone", method: "pseudonym_reversible" }
    - { name: "contactInfo_value",      sdd_path: "system.application.applicants[].contactInformation[].value",                  method: "pseudonym_reversible" }
    # Business / business-address contact PII
    - { name: "business_contactName",   sdd_path: "system.application.applicants[].business[].contactName",                              method: "pseudonym_reversible" }
    - { name: "BusinessOwner_Name",     sdd_path: "system.application.applicants[].business[].BusinessOwner_Name",                       method: "pseudonym_reversible" }
    - { name: "bizAddr_contactPhone",   sdd_path: "system.application.applicants[].business[].businessAddresses[].contactPhone",         method: "pseudonym_reversible" }
    - { name: "bizAddr_contactName",    sdd_path: "system.application.applicants[].business[].businessAddresses[].contactName",          method: "pseudonym_reversible" }
    # Address PII
    - { name: "Addr_Phone",             sdd_path: "system.application.applicants[].addresses[].Addr_Phone",         method: "pseudonym_reversible" }
    - { name: "Addr_ContactName",       sdd_path: "system.application.applicants[].addresses[].Addr_ContactName",   method: "pseudonym_reversible" }
    - { name: "addr_contactPhone",      sdd_path: "system.application.applicants[].addresses[].contactPhone",       method: "pseudonym_reversible" }
    # Employment PII
    - { name: "emp_EmployerContact",    sdd_path: "system.application.applicants[].employmentDetails[].ApplicantEmployment_EmploymentContact", method: "pseudonym_reversible" }
    - { name: "emp_employerContact",    sdd_path: "system.application.applicants[].employmentDetails[].employerContact",                       method: "pseudonym_reversible" }
    # CAN bureau data blobs — raw XML/text from TransUnion; cannot be field-parsed until Q-FFF resolved.
    # IC-4/IC-5: must not persist raw bureau PII; scrub the blob fields entirely.
    - { name: "tuca_xml_report", sdd_path: "system.application.applicants[].dataSources[].reports[].TUCONSCA_XMLReport", method: "scrub_never_store" }
    - { name: "tuca_report",     sdd_path: "system.application.applicants[].dataSources[].reports[].report",             method: "scrub_never_store" }
    - { name: "tuca_tty",        sdd_path: "system.application.applicants[].dataSources[].reports[].TUCONSCA_TTY",       method: "scrub_never_store" }
  extra_columns_scan:
    enabled: true
    patterns: ["ssn", "sin", "email", "phone", "fein"]

extra_columns_groups:
  - name: SOC_pygdsa_attributes
    connector: C103403
    description: Flat attribute dict from pygdsa_json double-parse
  - name: SOC_derived_application
    connector: C225334
    description: Parsed DerivedApplicationRecord[0].Payload (json_double_parse)
  - name: SOC_decision_variable
    connector: C225334
    description: Parsed DecisionVariableRecord[0].Payload (json_double_parse)
  - name: SOC_decision_req
    connector: C238743
    description: Parsed data.Decision sub-fields from REQ (ast_literal_eval)

validation:
  hard_quarantine_rules:
    - REQ-VAL-001
    - REQ-VAL-002
    - REQ-VAL-003
    - REQ-VAL-005
    - REQ-VAL-007
    - REQ-VAL-008
  soft_warn_rules:
    - REQ-VAL-004
    - REQ-VAL-006
    - REQ-BL-001
    - REQ-BL-002
    - REQ-BL-003
    - REQ-BL-004
    - REQ-BL-005
  client_params: {}
